name = "orch-agent-do"
main = "src/index.ts"
# Bump compatibility_date before any real deployment. See
# https://developers.cloudflare.com/workers/configuration/compatibility-dates/
compatibility_date = "2026-05-01"
# WebSocket outbound (for NATS-over-WS) + Node.js Buffer (used by @nats-io).
compatibility_flags = ["nodejs_compat"]

# Durable Object binding — module-level worker resolves AGENT_DO.idFromName(<session>)
# and forwards the request to the per-session DO stub.
[[durable_objects.bindings]]
name = "AGENT_DO"
class_name = "AgentDO"

# Migration declaring the DO class. Update to v2/v3 if you rename or delete classes;
# see https://developers.cloudflare.com/durable-objects/reference/durable-objects-migrations/
[[migrations]]
tag = "v1"
new_classes = ["AgentDO"]

# Cron trigger keeps each session DO discoverable across the warm window.
# The handler routes a tickle request through the binding so every named
# session DO refreshes its alarm — see src/index.ts scheduled() and the
# README "Keepalive" section. Every 5 minutes is well inside CF's eviction
# window for active DOs and matches Synadia agent service heartbeat cadence.
[triggers]
crons = ["*/5 * * * *"]

[vars]
# Owner token: arbitrary namespace for this deployment (e.g. GitHub username).
# Used as the 4th subject token: agents.prompt.open-agent.<OPEN_AGENT_OWNER>.<session>
OPEN_AGENT_OWNER = "changeme"

# Model provider and model ID forwarded to open-agent's modelFactory.
OPEN_AGENT_PROVIDER = "openrouter"
OPEN_AGENT_MODEL_ID = "anthropic/claude-3-5-haiku"

# Comma-separated list of session names the cron tickle should poke to keep
# them warm. Leave empty if you want clients to revive sessions lazily on
# the first real fetch — they still pin until idle eviction.
OPEN_AGENT_WARM_SESSIONS = ""

# [secrets] — set with `wrangler secret put`:
#
#   wrangler secret put NATS_WS_URL
#     → ws://your-nats-host:8080 (WebSocket NATS endpoint; NOT nats://)
#       Enable WebSocket on nats-server via a config file with
#       `websocket { port: 8080, no_tls: true }` and run
#       `nats-server -c nats.conf`.
#
#   wrangler secret put OPENROUTER_API_KEY
#     → sk-or-... (from openrouter.ai/settings/keys)
#
#   wrangler secret put AI_GATEWAY_API_KEY   (only if OPEN_AGENT_PROVIDER=gateway)
#     → from vercel.com/dashboard/ai-gateway

[[rules]]
type = "ESModule"
globs = ["**/*.ts"]
