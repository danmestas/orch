name: ci

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so a follow-up push doesn't pile up
# on top of an in-flight run. PRs running in the merge queue use a separate
# ref so they aren't accidentally cancelled by direct-branch pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: shellcheck — bin scripts (bash only)
        # orch-relayout is python; filter inputs by shebang so non-shell files don't trip SC1071.
        run: |
          files=()
          for f in bin/orch*; do
            head -1 "$f" | grep -qE '\b(ba)?sh\b' && files+=("$f")
          done
          shellcheck --severity=warning "${files[@]}"

      - name: shellcheck — hooks
        run: shellcheck --severity=warning hooks/*.sh

      - name: node --check — scripts
        run: |
          for f in scripts/*.js; do
            node --check "$f"
          done

      - name: jq — validate JSON manifests
        run: |
          jq -e . package.json > /dev/null
          jq -e . settings-snippet.json > /dev/null

      - name: "npm pack — dry run (catches files: + bin-path regressions)"
        run: npm pack --dry-run

  go-tests:
    name: go unit tests + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        # Runs all Go unit tests. Notably the spawnspec schema drift
        # gate (internal/spawnspec/schema_drift_test.go) — fails when
        # dist/schema/*.json is out of sync with the Go structs.
        # Regen with: go run ./cmd/spawnspec-schema -out dist/schema
        run: go test ./...

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: chown apt cache dirs so actions/cache can restore as the runner user
        run: |
          sudo mkdir -p /var/cache/apt/archives/partial /var/lib/apt/lists
          sudo chown -R "$(whoami)" /var/cache/apt /var/lib/apt/lists

      - name: cache apt downloads + lists
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-tmux-jq-fswatch-v1

      - name: install runtime deps (tmux, jq, fswatch)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux jq fswatch
          # apt re-creates partial/ subdirs as root during install — re-chown
          # so actions/cache's post-step tar can read them.
          sudo chown -R "$(whoami)" /var/cache/apt /var/lib/apt/lists

      - name: PR-safe integration suite
        # Tests assert $TMUX is set + a real tmux session exists, so we wrap the
        # runner inside `tmux new-session -d`, poll until it closes, and surface
        # its exit code.
        # A-list runs unconditionally; B-list runs with SKIP_REAL_OUTFIT=1 to bypass
        # the real-claude e2e portions and exercise only the mocked layers.
        env:
          SKIP_REAL_OUTFIT: "1"
        run: |
          set -e

          cat > /tmp/orch-ci-runner.sh <<'RUNNER'
          #!/usr/bin/env bash
          set -e
          cd "$ORCH_ROOT"
          export PATH="$PWD/bin:$PATH"
          declare -a tests=(
            test/test-orch-bundle-gc.sh
            test/test-orch-project-resolution.sh
            test/test-orch-spawn-output.sh
            test/test-orch-spawn-bridge.sh
            test/test-orch-spawn-sesh-session.sh
            test/test-orch-worktree-from.sh
            test/test-orch-cwd-quoting.sh
            test/test-orch-spawn-verify.sh
            test/test-orch-verify-retry.sh
            test/test-orch-tail.sh
            test/test-orch-version.sh
            test/test-orch-observer-role.sh
            test/test-orch-spy.sh
            test/test-orch-stack.sh
            test/test-cc-subagent-bridge.sh
          )
          for t in "${tests[@]}"; do
            echo "=== $t ==="
            bash "$t"
          done
          RUNNER
          chmod +x /tmp/orch-ci-runner.sh

          rm -f /tmp/orch-ci.log /tmp/orch-ci.rc
          # After the runner script finishes, kill the ci tmux server unconditionally.
          # Some tests (orch-spawn family) leave zombie panes that keep the session
          # alive — without the trailing kill-server, has-session loops forever and
          # the job hits the 6h GH Actions timeout. See #28's verify-retry test +
          # follow-up issue tracking the per-test cleanup fix.
          ORCH_ROOT="$PWD" tmux -L ci new-session -d -s ci -x 200 -y 50 \
            "/tmp/orch-ci-runner.sh > /tmp/orch-ci.log 2>&1; echo \$? > /tmp/orch-ci.rc; tmux -L ci kill-server 2>/dev/null || true"

          # Bounded wait — even if kill-server is racing, cap at 15 min so a
          # bug here can't blow the entire CI budget.
          deadline=$(( $(date +%s) + 900 ))
          while tmux -L ci has-session -t ci 2>/dev/null; do
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo "warn: ci tmux session lingered past 15min; force-killing"
              tmux -L ci kill-server 2>/dev/null || true
              break
            fi
            sleep 1
          done

          cat /tmp/orch-ci.log
          test "$(cat /tmp/orch-ci.rc)" = "0"

      - name: real-harness suite (workflow_dispatch only)
        # These need a live claude/pi/transcript and can't run on a clean Ubuntu runner.
        if: github.event_name == 'workflow_dispatch'

        run: |
          set -e

          cat > /tmp/orch-ci-runner-real.sh <<'RUNNER'
          #!/usr/bin/env bash
          set -e
          cd "$ORCH_ROOT"
          export PATH="$PWD/bin:$PATH"
          declare -a tests=(
            test/test-orch-peek.sh
            test/test-orch-subscribe-real.sh
            test/test-suit-integration.sh
          )
          for t in "${tests[@]}"; do
            echo "=== $t ==="
            bash "$t"
          done
          RUNNER
          chmod +x /tmp/orch-ci-runner-real.sh

          rm -f /tmp/orch-ci-real.log /tmp/orch-ci-real.rc
          ORCH_ROOT="$PWD" tmux -L ci-real new-session -d -s ci-real -x 200 -y 50 \
            "/tmp/orch-ci-runner-real.sh > /tmp/orch-ci-real.log 2>&1; echo \$? > /tmp/orch-ci-real.rc"

          while tmux -L ci-real has-session -t ci-real 2>/dev/null; do
            sleep 1
          done

          cat /tmp/orch-ci-real.log
          test "$(cat /tmp/orch-ci-real.rc)" = "0"

  adapter-contract:
    name: adapter contract bench (T9/T10/T11)
    runs-on: ubuntu-latest
    # Hard gate on PRs that touch the shim, orch spawn path, or publish hooks.
    # Both docker bench and sesh bench must exit 0.
    # Runs on pull_request AND merge_group so the required status check is
    # satisfied in both contexts. A skipped job does NOT satisfy branch
    # protection — see farley playbook common pitfalls.
    if: |
      github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: check if adapter-relevant files changed
        id: filter
        run: |
          # pull_request: diff PR base..head. merge_group: diff merge_group base..head.
          # Falls back to "relevant" so we never silently skip the gate when refs
          # can't be resolved.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.merge_group.base_sha }}"
            HEAD="${{ github.event.merge_group.head_sha }}"
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || echo "FALLBACK")
          if [[ "$changed" == "FALLBACK" ]] || printf '%s\n' "$changed" | grep -qE \
              '^(cmd/orch-agent-shim/|cmd/orch/|internal/adapter/|internal/tmuxctl/|hooks/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@v3

      - name: run docker bench with MOCK_USE_SHIM=1 (T1–T11)
        if: steps.filter.outputs.relevant == 'true'
        run: |
          MOCK_USE_SHIM=1 bash test/docker/run-tests.sh --with-shim

      - name: run sesh bench
        if: steps.filter.outputs.relevant == 'true'
        run: |
          bash test/docker-sesh/run-tests.sh

  bench:
    name: latency benchmark (soft gate)
    runs-on: ubuntu-latest
    # Run on PRs that touch the bridge, shim, orch spawn, or hook scripts.
    # Soft warning only — latency varies on shared runners; never a hard gate.
    # Also runs on merge_group events so the required status check context
    # is satisfied if the merge queue is ever enabled (per farley playbook).
    if: |
      github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: check if bench-relevant files changed
        id: filter
        run: |
          # pull_request: diff PR base..head. merge_group: diff merge_group base..head.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.merge_group.base_sha }}"
            HEAD="${{ github.event.merge_group.head_sha }}"
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || echo "FALLBACK")
          if [[ "$changed" == "FALLBACK" ]] || printf '%s\n' "$changed" | grep -qE \
              '^(cmd/orch-agent-shim/|cmd/orch/|internal/adapter/|internal/tmuxctl/|hooks/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: run benchmark + compare to latest baseline
        if: steps.filter.outputs.relevant == 'true'
        id: bench
        run: |
          set -e
          # Reduce sample size for CI to keep runtime under 3 min.
          export BENCH_SAMPLES=20
          export BENCH_WARMUP=3
          export BENCH_HB_DURATION=15

          bash test/bench/measure.sh --no-build 2>&1 | tee /tmp/bench-run.log || true
          RESULT=$(ls -t test/bench/results-*.md 2>/dev/null | head -1)

          BASELINE=$(ls -t test/bench/baselines/baseline-*.md 2>/dev/null | head -1)
          if [ -n "$BASELINE" ] && [ -n "$RESULT" ]; then
            COMPARE_OUT=$(bash test/bench/compare.sh "$BASELINE" "$RESULT" 2>&1 || true)
            echo "$COMPARE_OUT"
            printf '%s\n' "$COMPARE_OUT" > /tmp/bench-compare.md
          else
            echo "No baseline available yet — skipping regression check."
            printf '(no baseline for comparison)\n' > /tmp/bench-compare.md
          fi

          # Surface the result file for the comment step.
          if [ -n "$RESULT" ]; then
            cat "$RESULT" >> /tmp/bench-compare.md
          fi

      - name: comment bench diff on PR
        # Only comments on pull_request events — merge_group events have no
        # PR issue number context, so skip the comment step there.
        if: steps.filter.outputs.relevant == 'true' && steps.bench.outcome != 'skipped' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('/tmp/bench-compare.md')
              ? fs.readFileSync('/tmp/bench-compare.md', 'utf8')
              : '(bench output not found)';
            const marker = '<!-- orch-bench-comment -->';
            const fullBody = `${marker}\n\n## Protocol overhead benchmark\n\n${body}\n\n` +
              `_Soft warning: latency on shared runners varies. Regressions ≥ 20% flagged._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
