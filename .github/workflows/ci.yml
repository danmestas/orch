name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: shellcheck — bin scripts (bash only)
        # orch-relayout is python; filter inputs by shebang so non-shell files don't trip SC1071.
        run: |
          files=()
          for f in bin/orch*; do
            head -1 "$f" | grep -qE '\b(ba)?sh\b' && files+=("$f")
          done
          shellcheck --severity=warning "${files[@]}"

      - name: shellcheck — hooks
        run: shellcheck --severity=warning hooks/*.sh

      - name: shellcheck — install.sh
        run: shellcheck --severity=warning install.sh

      - name: node --check — scripts
        run: |
          for f in scripts/*.js; do
            node --check "$f"
          done

      - name: jq — validate JSON manifests
        run: |
          jq -e . package.json > /dev/null
          jq -e . settings-snippet.json > /dev/null

      - name: "npm pack — dry run (catches files: + bin-path regressions)"
        run: npm pack --dry-run

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: chown apt cache dirs so actions/cache can restore as the runner user
        run: |
          sudo mkdir -p /var/cache/apt/archives/partial /var/lib/apt/lists
          sudo chown -R "$(whoami)" /var/cache/apt /var/lib/apt/lists

      - name: cache apt downloads + lists
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-tmux-jq-fswatch-v1

      - name: install runtime deps (tmux, jq, fswatch)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux jq fswatch
          # apt re-creates partial/ subdirs as root during install — re-chown
          # so actions/cache's post-step tar can read them.
          sudo chown -R "$(whoami)" /var/cache/apt /var/lib/apt/lists

      - name: PR-safe integration suite
        # Tests assert $TMUX is set + a real tmux session exists, so we wrap the
        # runner inside `tmux new-session -d`, poll until it closes, and surface
        # its exit code.
        # A-list runs unconditionally; B-list runs with SKIP_REAL_OUTFIT=1 to bypass
        # the real-claude e2e portions and exercise only the mocked layers.
        env:
          SKIP_REAL_OUTFIT: "1"
        run: |
          set -e

          cat > /tmp/orch-ci-runner.sh <<'RUNNER'
          #!/usr/bin/env bash
          set -e
          cd "$ORCH_ROOT"
          export PATH="$PWD/bin:$PATH"
          declare -a tests=(
            test/test-orch-bundle-gc.sh
            test/test-orch-current-jsonl.sh
            test/test-orch-listen-stream.sh
            test/test-orch-project-resolution.sh
            test/test-orch-spawn-output.sh
            test/test-orch-spawn-verify.sh
            test/test-orch-subscribe.sh
            test/test-orch-version.sh
            test/test-orch-observer-role.sh
            test/test-orch-spy.sh
          )
          for t in "${tests[@]}"; do
            echo "=== $t ==="
            bash "$t"
          done
          RUNNER
          chmod +x /tmp/orch-ci-runner.sh

          rm -f /tmp/orch-ci.log /tmp/orch-ci.rc
          ORCH_ROOT="$PWD" tmux -L ci new-session -d -s ci -x 200 -y 50 \
            "/tmp/orch-ci-runner.sh > /tmp/orch-ci.log 2>&1; echo \$? > /tmp/orch-ci.rc"

          while tmux -L ci has-session -t ci 2>/dev/null; do
            sleep 1
          done

          cat /tmp/orch-ci.log
          test "$(cat /tmp/orch-ci.rc)" = "0"

      - name: real-harness suite (workflow_dispatch only)
        # These need a live claude/pi/transcript and can't run on a clean Ubuntu runner.
        if: github.event_name == 'workflow_dispatch'

        run: |
          set -e

          cat > /tmp/orch-ci-runner-real.sh <<'RUNNER'
          #!/usr/bin/env bash
          set -e
          cd "$ORCH_ROOT"
          export PATH="$PWD/bin:$PATH"
          declare -a tests=(
            test/test-orch-claim-operator.sh
            test/test-orch-peek.sh
            test/test-orch-subscribe-real.sh
            test/test-suit-integration.sh
          )
          for t in "${tests[@]}"; do
            echo "=== $t ==="
            bash "$t"
          done
          RUNNER
          chmod +x /tmp/orch-ci-runner-real.sh

          rm -f /tmp/orch-ci-real.log /tmp/orch-ci-real.rc
          ORCH_ROOT="$PWD" tmux -L ci-real new-session -d -s ci-real -x 200 -y 50 \
            "/tmp/orch-ci-runner-real.sh > /tmp/orch-ci-real.log 2>&1; echo \$? > /tmp/orch-ci-real.rc"

          while tmux -L ci-real has-session -t ci-real 2>/dev/null; do
            sleep 1
          done

          cat /tmp/orch-ci-real.log
          test "$(cat /tmp/orch-ci-real.rc)" = "0"

  adapter-contract:
    name: adapter contract bench (T9/T10/T11)
    runs-on: ubuntu-latest
    # Hard gate on PRs that touch the shim, executors, or publish hooks.
    # Both docker bench and sesh bench must exit 0.
    if: |
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: check if adapter-relevant files changed
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
          if printf '%s\n' "$changed" | grep -qE \
              '^(cmd/orch-agent-shim/|executors/|hooks/orch-nats-publish-)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@v3

      - name: run docker bench with MOCK_USE_SHIM=1 (T1–T11)
        if: steps.filter.outputs.relevant == 'true'
        run: |
          MOCK_USE_SHIM=1 bash test/docker/run-tests.sh --with-shim

      - name: run sesh bench
        if: steps.filter.outputs.relevant == 'true'
        run: |
          bash test/docker-sesh/run-tests.sh

  bench:
    name: latency benchmark (soft gate)
    runs-on: ubuntu-latest
    # Run on PRs that touch the bridge, shim, executors, or hook scripts.
    # Soft warning only — latency varies on shared runners; never a hard gate.
    if: |
      github.event_name == 'pull_request' && (
        contains(github.event.pull_request.title, '[bench]') ||
        true
      )
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: check if bench-relevant files changed
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
          if printf '%s\n' "$changed" | grep -qE \
              '^(bin/orch-nats-bridge-in|cmd/orch-agent-shim/|executors/|hooks/|gemini-hooks/|codex-hooks/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: run benchmark + compare to latest baseline
        if: steps.filter.outputs.relevant == 'true'
        id: bench
        run: |
          set -e
          # Reduce sample size for CI to keep runtime under 3 min.
          export BENCH_SAMPLES=20
          export BENCH_WARMUP=3
          export BENCH_HB_DURATION=15

          bash test/bench/measure.sh --no-build 2>&1 | tee /tmp/bench-run.log || true
          RESULT=$(ls -t test/bench/results-*.md 2>/dev/null | head -1)

          BASELINE=$(ls -t test/bench/baselines/baseline-*.md 2>/dev/null | head -1)
          if [ -n "$BASELINE" ] && [ -n "$RESULT" ]; then
            COMPARE_OUT=$(bash test/bench/compare.sh "$BASELINE" "$RESULT" 2>&1 || true)
            echo "$COMPARE_OUT"
            printf '%s\n' "$COMPARE_OUT" > /tmp/bench-compare.md
          else
            echo "No baseline available yet — skipping regression check."
            printf '(no baseline for comparison)\n' > /tmp/bench-compare.md
          fi

          # Surface the result file for the comment step.
          if [ -n "$RESULT" ]; then
            cat "$RESULT" >> /tmp/bench-compare.md
          fi

      - name: comment bench diff on PR
        if: steps.filter.outputs.relevant == 'true' && steps.bench.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('/tmp/bench-compare.md')
              ? fs.readFileSync('/tmp/bench-compare.md', 'utf8')
              : '(bench output not found)';
            const marker = '<!-- orch-bench-comment -->';
            const fullBody = `${marker}\n\n## Protocol overhead benchmark\n\n${body}\n\n` +
              `_Soft warning: latency on shared runners varies. Regressions ≥ 20% flagged._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
