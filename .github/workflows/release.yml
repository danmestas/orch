name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (npm pack, no publish)'
        type: boolean
        default: false

permissions:
  id-token: write       # OIDC — enables npm trusted publishing when npmjs side is configured
  contents: read

jobs:
  publish:
    name: publish to npm
    # npmjs trusted-publisher entry has environment="production" (the registry default
    # when none is passed at trust-config time). The OIDC token's claims must match
    # exactly, so this job must run under the "production" GitHub Environment.
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Show npm version (must be 11.5+ for trusted-publishing OIDC auth)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify package contents (dry-run pack)
        run: npm pack --dry-run

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --dry-run --access public --provenance --verbose

      - name: Publish
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance --verbose

  smoke:
    name: post-publish smoke
    # Skip on dry-run dispatches — there's nothing to install from the registry.
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: install runtime deps (tmux, jq, fswatch)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux jq fswatch

      - name: install just-published tarball
        # Tag pushes set GITHUB_REF_NAME to the tag (e.g. v0.1.7); strip the leading v.
        # workflow_dispatch on a branch falls back to package.json's version.
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || \
                      curl -s https://registry.npmjs.org/@agent-ops/orch/latest | jq -r .version)
          fi
          echo "installing @agent-ops/orch@$VERSION"
          # Retry up to 5 times in case of registry propagation lag.
          for i in 1 2 3 4 5; do
            if npm install -g "@agent-ops/orch@$VERSION"; then break; fi
            echo "install attempt $i failed; sleeping 10s and retrying..."
            sleep 10
          done
          npm list -g --depth=0 | grep '@agent-ops/orch' || (echo "package not installed" && exit 1)

      - name: bin shim probe
        # After #189A/B/C, the only published bin entry that operators invoke
        # directly is `orch` — the rest (`tell`, `ask`, `peek`, `spy`, `spawn`,
        # `migrate-aliases`) are in-process subcommands of the Go dispatcher,
        # and `up`/`down`/`version` are sibling binaries the dispatcher execs.
        # Probe: assert the canonical entry exists and the retired bash bins do not.
        run: |
          set -e
          which orch
          # Retired bins MUST NOT be on PATH after a clean install. If they
          # are, an older install bled through and consumers will hit stale
          # behavior. (#189 friction points 1+2+3.)
          for cmd in orch-tell orch-ask orch-peek orch-spy orch-spawn orch-claim-operator orch-register orch-listen; do
            if which "$cmd" 2>/dev/null; then
              echo "ERROR: retired bin '$cmd' is still on PATH after install"
              exit 1
            fi
          done

      - name: smoke — orch --help
        # Proves the main dispatcher loads and prints its help text.
        run: orch --help

      - name: smoke — orch subcommand contract
        # Assert the dispatcher's help text advertises every subcommand we
        # intend to ship in this release. Catches accidental subcommand
        # removal at release time (the dispatcher would still load, but the
        # surface would have silently shrunk).
        run: |
          set -e
          help=$(orch --help)
          for sub in tell ask peek spy spawn migrate-aliases up down version; do
            echo "$help" | grep -qE "orch $sub( |$)" \
              || { echo "MISSING: 'orch $sub' not advertised by 'orch --help'"; exit 1; }
          done
          echo "all expected subcommands present in orch --help"

      - name: smoke — orch up --dry-run
        # Exercises the up flow's import + dep-check path without mutating ~/.claude.
        run: orch up --dry-run

      - name: smoke — orch down --dry-run
        # Same for the down flow.
        run: orch down --dry-run --yes
