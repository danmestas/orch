name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (npm pack, no publish)'
        type: boolean
        default: false

permissions:
  id-token: write       # OIDC — enables npm trusted publishing when npmjs side is configured
  contents: write       # goreleaser uploads release assets to GitHub Releases

jobs:
  goreleaser:
    name: build Go binaries + GitHub Release
    # Skip on dry-run dispatches — no tag, nothing to release. The publish
    # job's dry-run path still exercises `npm pack` without needing the
    # binaries to exist on a release.
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: publish to npm
    # npmjs trusted-publisher entry has environment="production" (the registry default
    # when none is passed at trust-config time). The OIDC token's claims must match
    # exactly, so this job must run under the "production" GitHub Environment.
    environment: production
    # Wait for goreleaser to upload the platform archives — scripts/postinstall.js
    # downloads them at install time, so the npm publish must follow the GH Release.
    # On dry-run dispatches, goreleaser is skipped, so we tolerate skipped.
    needs: goreleaser
    if: ${{ always() && (github.event_name == 'push' || inputs.dry_run != true) && (needs.goreleaser.result == 'success' || needs.goreleaser.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Show npm version (must be 11.5+ for trusted-publishing OIDC auth)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify package contents (dry-run pack)
        run: npm pack --dry-run

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --dry-run --access public --provenance --verbose

      - name: Publish
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance --verbose

  smoke:
    name: post-publish smoke
    # Skip on dry-run dispatches — there's nothing to install from the registry.
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: install runtime deps (tmux, jq, fswatch)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux jq fswatch

      - name: install just-published tarball
        # Tag pushes set GITHUB_REF_NAME to the tag (e.g. v0.2.1); strip the leading v.
        # workflow_dispatch on a branch falls back to package.json's version.
        # Note: this is the FULL postinstall path — it triggers
        # scripts/postinstall.js which fetches the platform archive from
        # the GH Release goreleaser just produced. If the binaries didn't
        # land, the smoke steps below catch it.
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || \
                      curl -s https://registry.npmjs.org/@agent-ops/orch/latest | jq -r .version)
          fi
          echo "installing @agent-ops/orch@$VERSION"
          # Retry up to 5 times in case of registry propagation lag.
          for i in 1 2 3 4 5; do
            if npm install -g "@agent-ops/orch@$VERSION"; then break; fi
            echo "install attempt $i failed; sleeping 10s and retrying..."
            sleep 10
          done
          npm list -g --depth=0 | grep '@agent-ops/orch' || (echo "package not installed" && exit 1)

      - name: bin shim probe
        # Proves every declared bin entry actually resolves on PATH and is executable.
        # Catches the bin-path regression class that bit v0.1.0.
        run: |
          set -e
          for cmd in orch orch-up orch-down orch-version \
                    orch-subtree orch-workflow orch-registry \
                    orch-goal-stop-account-daemon; do
            which "$cmd"
          done

      - name: smoke — orch --help
        # Proves the main dispatcher loads and prints its help text.
        run: orch --help

      - name: smoke — orch up --dry-run
        # Exercises the up flow's import + dep-check path without mutating ~/.claude.
        run: orch up --dry-run

      - name: smoke — orch down --dry-run
        # Same for the down flow.
        run: orch down --dry-run --yes

      - name: smoke — vendored Go binaries respond
        # Proves the postinstall successfully fetched the platform archive
        # from the GH Release goreleaser uploaded, and the bash shims
        # exec the vendored binary instead of trying to lazy-build. This
        # is the install-fix smoke that v0.2.1 exists for: each binary
        # must respond to its standard probe without printing
        # "cannot find go.mod".
        run: |
          set -e
          # orch-subtree validate with no args prints usage to stderr and exits 2.
          set +e
          out=$(orch-subtree list 2>&1); rc=$?
          set -e
          echo "orch-subtree list: rc=$rc"
          echo "$out" | head -5
          # Anything other than the lazy-build error is acceptable here — the
          # smoke is "did the binary execute" not "did the command succeed".
          if echo "$out" | grep -q "cannot find go.mod"; then
            echo "FAIL: orch-subtree fell through to lazy-build path" >&2
            exit 1
          fi

          set +e
          out=$(orch-workflow validate 2>&1); rc=$?
          set -e
          echo "orch-workflow validate: rc=$rc"
          echo "$out" | head -5
          if echo "$out" | grep -q "cannot find go.mod"; then
            echo "FAIL: orch-workflow fell through to lazy-build path" >&2
            exit 1
          fi
