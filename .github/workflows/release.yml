name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (npm pack, no publish)'
        type: boolean
        default: false

permissions:
  id-token: write       # OIDC — enables npm trusted publishing when npmjs side is configured
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (trusted-publishing OIDC auth requires 11.5+)
        run: npm install -g npm@latest

      - name: Verify package contents (dry-run pack)
        run: npm pack --dry-run

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --dry-run --access public --provenance

      - name: Publish
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance
