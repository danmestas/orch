name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (npm pack, no publish)'
        type: boolean
        default: false

permissions:
  id-token: write       # OIDC — enables npm trusted publishing when npmjs side is configured
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package contents (dry-run pack)
        run: npm pack --dry-run

      # NODE_AUTH_TOKEN is the bridge: npm CLI prefers OIDC when trusted
      # publishing is configured on npmjs side. Token used only as fallback.
      # Drop when 'npm trust list @agent-ops/orch' confirms the GitHub trust
      # relationship is active and a publish run uses OIDC end-to-end.
      - name: Publish (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --dry-run --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
